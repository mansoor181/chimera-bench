# MEAN CHIMERA-Bench configuration
# Paths inherited from ../shared_config.yaml (data_root, results_root, trans_baselines)

# Dataset
dataset:
  split: epitope_group  # epitope_group | antigen_fold | temporal
  cdr_type: "3"  # 1 | 2 | 3

# Model (original MEAN hyperparameters)
model:
  embed_size: 64
  hidden_size: 128
  n_layers: 3
  n_iter: 5
  alpha: 0.05
  n_channel: 4
  mode: "111"

# Training
training:
  seed: 42
  gpu: 0
  lr: 1.0e-3
  batch_size: 16
  max_epoch: 20
  anneal_base: 1.0
  grad_clip: 1.0
  num_workers: 4

# Callbacks
callbacks:
  early_stopping:
    patience: 10
    mode: min
  checkpoint:
    mode: min

# WandB
wandb:
  enabled: false
  project: chimera_baselines
